<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Idle Mine Clicker</title>
<link rel="stylesheet" href="style.css">
</head>
<hr style="width: 60%; opacity: 0.3;">
<body>

<!-- MAIN MENU -->
<div id="menu">
    <h1>⛏️ Main Menu Miner</h1>
    <button id="startBtn">Start Game</button>
</div>

<!-- GAME -->
<div id="gameWrapper" style="display: none;">
    <div class="background" id="bg"></div>

    <div class="container" id="game">
        <h1>⛏️ Idle Mine Clicker</h1>

        <p id="gold">Gold: 0</p>
        <p id="stats">Per Click: 1 | Per Second: 0</p>

        <button id="mineBtn">⛏️ Mine Gold</button>

        <div>
            <button id="upgradeClick">Upgrade Pickaxe (10)</button>
            <button id="upgradeIdle">Hire Miner (25)</button>
        </div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
