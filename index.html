<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Idle Mine Clicker</title>

<style>
body {
    margin: 0;
    background: linear-gradient(#1e1e2f, #2c2c54);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
}

/* Background layer */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    overflow: hidden;
    z-index: 0;
}

/* Floating gold coins */
.coin {
    position: absolute;
    font-size: 20px;
    animation: floatCoin linear infinite;
    opacity: 0.7;
}

@keyframes floatCoin {
    from {
        transform: translateY(100vh);
    }
    to {
        transform: translateY(-10vh);
    }
}

/* Miners */
.miner {
    position: absolute;
    bottom: 10px;
    font-size: 30px;
    animation: walk 6s linear infinite;
}

@keyframes walk {
    0% { left: -50px; }
    100% { left: 100%; }
}

/* Game UI */
.container {
    position: relative;
    z-index: 1;
    margin-top: 50px;
}

button {
    padding: 15px 25px;
    margin: 10px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background-color: #4CAF50;
    color: white;
    transition: transform 0.1s, background-color 0.2s;
}

button:hover {
    background-color: #45a049;
}

button:active {
    transform: scale(0.9);
}

/* Floating click text */
.floating-text {
    position: absolute;
    color: gold;
    font-weight: bold;
    pointer-events: none;
    animation: floatUp 1s ease-out forwards;
}

@keyframes floatUp {
    0% { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-50px); }
}
</style>
</head>

<body>

<div class="background" id="bg"></div>

<div class="container" id="game">
    <h1>⛏️ Idle Mine Clicker</h1>

    <p id="gold">Gold: 0</p>
    <p id="stats">Per Click: 1 | Per Second: 0</p>

    <button id="mineBtn">Mine Gold</button>

    <div>
        <button id="upgradeClick">Upgrade Pickaxe (10)</button>
        <button id="upgradeIdle">Hire Miner (25)</button>
    </div>
</div>

<script>
let gold = 0;
let goldPerClick = 1;
let goldPerSecond = 0;

let upgradeClickCost = 10;
let upgradeIdleCost = 25;

const goldText = document.getElementById("gold");
const statsText = document.getElementById("stats");
const mineBtn = document.getElementById("mineBtn");
const bg = document.getElementById("bg");

const upgradeClickBtn = document.getElementById("upgradeClick");
const upgradeIdleBtn = document.getElementById("upgradeIdle");

function updateUI() {
    goldText.innerText = "Gold: " + gold;
    statsText.innerText =
        "Per Click: " + goldPerClick +
        " | Per Second: " + goldPerSecond;

    upgradeClickBtn.innerText = "Upgrade Pickaxe (" + upgradeClickCost + ")";
    upgradeIdleBtn.innerText = "Hire Miner (" + upgradeIdleCost + ")";
}

// Floating click text
function createFloatingText(x, y, amount) {
    const text = document.createElement("div");
    text.className = "floating-text";
    text.innerText = "+" + amount;
    text.style.left = x + "px";
    text.style.top = y + "px";
    document.body.appendChild(text);
    setTimeout(() => text.remove(), 1000);
}

// Generate background coins
function spawnCoin() {
    const coin = document.createElement("div");
    coin.className = "coin";
    coin.innerText = "🪙";

    coin.style.left = Math.random() * 100 + "vw";
    coin.style.animationDuration = (3 + Math.random() * 5) + "s";

    bg.appendChild(coin);

    setTimeout(() => coin.remove(), 8000);
}

// Generate miners
function spawnMiner() {
    const miner = document.createElement("div");
    miner.className = "miner";
    miner.innerText = "⛏️";

    miner.style.animationDuration = (5 + Math.random() * 5) + "s";

    bg.appendChild(miner);

    setTimeout(() => miner.remove(), 10000);
}

// Click
mineBtn.onclick = (e) => {
    gold += goldPerClick;
    updateUI();
    createFloatingText(e.clientX, e.clientY, goldPerClick);
};

// Upgrades
upgradeClickBtn.onclick = () => {
    if (gold >= upgradeClickCost) {
        gold -= upgradeClickCost;
        goldPerClick++;
        upgradeClickCost *= 2;
        updateUI();
    }
};

upgradeIdleBtn.onclick = () => {
    if (gold >= upgradeIdleCost) {
        gold -= upgradeIdleCost;
        goldPerSecond++;
        upgradeIdleCost *= 2;
        updateUI();
    }
};

// Idle income
setInterval(() => {
    if (goldPerSecond > 0) {
        gold += goldPerSecond;
        updateUI();
    }
}, 1000);

// Background loops
setInterval(spawnCoin, 800);
setInterval(spawnMiner, 3000);

updateUI();
</script>

</body>
</html>
